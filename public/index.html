<body>
<div class="noise"></div>

<header>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-cpu" style="color:#0c0c0e; font-size:20px;"></i></div>
      <div>
        <h1>Подобрать компьютер</h1>

      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- TAB NAVIGATION -->
  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('configurator', this)">
      <i class="ti ti-adjustments-horizontal" style="font-size:15px;"></i>
      Конфигуратор
    </button>
    <button class="tab-btn" onclick="switchTab('favorites', this)" id="fav-tab-btn">
      <i class="ti ti-heart" style="font-size:15px;"></i>
      Избранное
      <span class="tab-badge" id="fav-badge" style="display:none;">0</span>
    </button>
  </div>

  <!-- CONFIGURATOR TAB -->
  <div class="tab-pane active" id="tab-configurator">
  <div class="config-panel" style="margin-top:28px;">
    <div class="section-title">Цель использования</div>
    <div class="purpose-chips" id="purpose-chips">
      <button class="chip active" data-val="gaming">🎮 Игры</button>
      <button class="chip" data-val="office">💼 Офис / учёба</button>
      <button class="chip" data-val="video">🎬 Видеомонтаж</button>
      <button class="chip" data-val="3d">🧊 3D / рендеринг</button>
      <button class="chip" data-val="streaming">📡 Стриминг</button>
      <button class="chip" data-val="programming">⌨️ Программирование</button>
    </div>

    <div class="section-title">Бюджет</div>
    <div class="budget-row">
      <span class="budget-label">от</span>
      <span class="budget-val" id="val-min">30 000 ₽</span>
      <div class="range-wrap">
        <div id="range-fill"></div>
        <input type="range" id="slider-min" min="20000" max="600000" step="5000" value="30000">
        <input type="range" id="slider-max" min="20000" max="600000" step="5000" value="180000">
      </div>
      <span class="budget-val" id="val-max">180 000 ₽</span>
      <span class="budget-label">до</span>
    </div>

    <div class="section-title">Требования к комплектующим</div>
    <div class="requirements-grid">
      <div class="req-group">
        <label>Процессор (CPU)</label>
        <select id="req-cpu">
          <option value="any">Без предпочтений</option>
          <option value="intel">Intel</option>
          <option value="amd">AMD Ryzen</option>
          <option value="intel-high">Intel Core i7/i9</option>
          <option value="amd-high">AMD Ryzen 7/9</option>
        </select>
      </div>
      <div class="req-group">
        <label>Видеокарта (GPU)</label>
        <select id="req-gpu">
          <option value="any">Без предпочтений</option>
          <option value="nvidia">NVIDIA GeForce</option>
          <option value="amd-gpu">AMD Radeon</option>
          <option value="rtx40">RTX 4060 и выше</option>
          <option value="rtx-high">RTX 4070 Ti и выше</option>
          <option value="integrated">Встроенная графика</option>
        </select>
      </div>
      <div class="req-group">
        <label>Оперативная память</label>
        <select id="req-ram">
          <option value="any">Без предпочтений</option>
          <option value="8">8 ГБ и более</option>
          <option value="16">16 ГБ и более</option>
          <option value="32">32 ГБ и более</option>
          <option value="64">64 ГБ и более</option>
        </select>
      </div>
      <div class="req-group">
        <label>Накопитель</label>
        <select id="req-storage">
          <option value="any">Без предпочтений</option>
          <option value="ssd-256">SSD 256 ГБ+</option>
          <option value="ssd-512">SSD 512 ГБ+</option>
          <option value="ssd-1tb">SSD 1 ТБ+</option>
          <option value="ssd-2tb">SSD 2 ТБ+</option>
        </select>
      </div>
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">
      <i class="ti ti-search" style="font-size:16px; vertical-align:-2px; margin-right:6px;"></i>
      Подобрать компьютер
    </button>
  </div>

  <div id="results-container"></div>
  </div><!-- end tab-configurator -->

  <!-- FAVORITES TAB -->
  <div class="tab-pane" id="tab-favorites">
    <div id="fav-content"></div>
  </div>
</div><!-- end wrap -->

<!-- COMPARE BAR (sticky bottom) -->
<div class="compare-bar" id="compare-bar">
  <div class="wrap">
    <div class="compare-bar-inner">
      <div style="font-size:13px; color:var(--muted); white-space:nowrap;">
        <i class="ti ti-scale" style="font-size:14px; vertical-align:-2px; margin-right:4px;"></i>
        Сравнение:
      </div>
      <div class="compare-chips" id="compare-chips"></div>
      <div class="compare-actions">
        <button class="compare-clear-btn" onclick="clearCompare()">Сбросить</button>
        <button class="compare-btn" onclick="openCompareModal()">
          <i class="ti ti-scale" style="font-size:14px; vertical-align:-2px; margin-right:4px;"></i>
          Сравнить
        </button>
      </div>
    </div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compare-modal" onclick="handleModalClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">
        <i class="ti ti-scale" style="font-size:16px; vertical-align:-2px; margin-right:6px; color:var(--accent);"></i>
        Сравнение сборок
      </div>
      <button class="modal-close" onclick="closeCompareModal()">
        <i class="ti ti-x"></i>
      </button>
    </div>
    <div class="compare-table-wrap" id="compare-table-wrap"></div>
  </div>
</div>

<footer>
  <div class="wrap">
    28 реальных сборок · Цены актуальны на 2026 год · Работает без интернета
  </div>
</footer>
